<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthem Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F0D;
    --panel:#151B18;
    --panel-hi:#1C2420;
    --turf:#1F6B4A;
    --amber:#F2A104;
    --sky:#4FA8D8;
    --text-dim:rgba(245,247,238,0.55);
    --line:rgba(245,247,238,0.10);
    --floodlight:#F5F7EE;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--floodlight);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;
    position:sticky;top:0;
    background:rgba(11,15,13,0.9);
    backdrop-filter:blur(8px);
    z-index:50;
    border-bottom:1px solid var(--line);
  }
  .logo{font-family:'Anton',sans-serif;font-size:22px;letter-spacing:0.5px;text-transform:uppercase;}
  .logo span{color:var(--amber);}
  .searchbox{
    flex:1;max-width:420px;margin:0 24px;
    background:var(--panel-hi);
    border-radius:22px;
    padding:10px 18px;
    color:var(--floodlight);
    font-size:13px;
    border:1px solid var(--line);
    font-family:'Inter', sans-serif;
    outline:none;
  }
  .searchbox::placeholder{color:var(--text-dim);}
  .searchbox:focus{border-color:var(--amber);}
  .no-results{
    color:var(--text-dim);font-size:13px;text-align:center;padding:40px 0;
  }

  .layout{display:flex;max-width:1300px;margin:0 auto;align-items:flex-start;}

  .sidebar{
    flex:0 0 200px;width:200px;
    position:sticky;top:65px;
    padding:24px 12px 40px;
    display:flex;flex-direction:column;gap:4px;
    max-height:calc(100vh - 65px);
    overflow-y:auto;
  }
  .sidebar-section{display:flex;flex-direction:column;gap:2px;}
  .sidebar-label{
    font-family:'Oswald',sans-serif;
    font-size:11px;text-transform:uppercase;letter-spacing:1.5px;
    color:var(--text-dim);
    padding:14px 12px 6px;
  }
  .sidebar-divider{height:1px;background:var(--line);margin:12px 4px;}
  .sidebar-item{
    display:flex;align-items:center;gap:10px;
    background:none;border:none;
    color:var(--text-dim);
    padding:10px 12px;
    border-radius:8px;
    font-size:14px;font-weight:600;
    font-family:'Inter',sans-serif;
    text-align:left;
    cursor:pointer;
    white-space:nowrap;
  }
  .sidebar-item:hover{background:var(--panel-hi);color:var(--floodlight);}
  .sidebar-item.active{background:var(--panel-hi);color:var(--floodlight);}

  .wrap{flex:1;min-width:0;padding:24px 28px 100px;}

  @media(max-width:760px){
    .layout{flex-direction:column;}
    .sidebar{
      position:static;width:100%;flex:none;max-height:none;
      flex-direction:row;overflow-x:auto;padding:12px 20px;gap:8px;
    }
    .sidebar-section{flex-direction:row;gap:8px;}
    .sidebar-label{display:none;}
    .sidebar-divider{display:none;}
    .sidebar-item{flex:0 0 auto;}
    .wrap{padding:20px 20px 100px;}
  }

  .collection-row{margin-bottom:34px;}
  .collection-row h2{
    font-family:'Oswald',sans-serif;
    font-size:20px;
    text-transform:uppercase;
    letter-spacing:1px;
    margin:0 0 14px;
  }
  .tile-scroll{
    display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;
    scrollbar-width:thin;
  }
  .tile{
    flex:0 0 168px;
    cursor:pointer;
    transition:transform .15s ease;
  }
  .tile:hover{transform:translateY(-3px);}
  .tile-art{
    width:168px;height:168px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:56px;
    margin-bottom:10px;
    position:relative;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .tile-name{font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;line-height:1.3;}
  .tile-song{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .fav-btn{
    position:absolute;top:6px;right:6px;
    width:28px;height:28px;
    border-radius:50%;border:none;
    background:rgba(0,0,0,0.45);
    color:#fff;font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;z-index:2;
  }
  .fav-btn:hover{background:rgba(0,0,0,0.65);}
  .fav-btn.active{color:var(--amber);}

  /* MODAL */
  .modal-backdrop{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,0.7);
    z-index:100;
    align-items:flex-end;
    justify-content:center;
  }
  .modal-backdrop.open{display:flex;}
  .modal{
    background:var(--panel);
    width:100%;max-width:720px;
    border-radius:18px 18px 0 0;
    padding:26px 26px 34px;
    max-height:88vh;
    overflow-y:auto;
    border-top:1px solid var(--line);
  }
  @media(min-width:760px){
    .modal-backdrop{align-items:center;}
    .modal{border-radius:18px;max-height:80vh;}
  }
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
  .modal-title-block{display:flex;gap:14px;align-items:center;}
  .modal-emoji{font-size:46px;}
  .modal-title-block h2{font-family:'Oswald',sans-serif;margin:0;font-size:22px;}
  .modal-title-block .song-line{font-size:13px;color:var(--amber);font-weight:600;margin-top:2px;}
  .modal-title-block .artist-line{font-size:12px;color:var(--text-dim);}
  .close-btn{
    background:var(--panel-hi);border:none;color:var(--floodlight);
    width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;
  }

  .player-area{
    background:#000;border-radius:10px;overflow:hidden;
    aspect-ratio:16/9;margin-bottom:6px;
    display:flex;align-items:center;justify-content:center;
  }
  .player-area iframe{width:100%;height:100%;border:0;}
  .no-video{
    color:var(--text-dim);text-align:center;padding:20px;font-size:13px;
  }
  .link-row{display:flex;gap:10px;margin:14px 0 20px;flex-wrap:wrap;}
  .link-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:9px 14px;border-radius:20px;
    font-size:12px;font-weight:700;text-decoration:none;
  }
  .link-btn.yt{background:#FF0000;color:#fff;}
  .link-btn.sp{background:#1DB954;color:#04140a;}

  .trivia-box{
    font-size:13px;color:var(--text-dim);
    background:var(--panel-hi);
    border-radius:10px;padding:12px 14px;
    margin-bottom:20px;line-height:1.5;
  }

  .lyrics-panel{
    background:var(--panel-hi);
    border-radius:12px;
    padding:18px;
    max-height:280px;
    overflow-y:auto;
  }
  .lyrics-panel h3{
    font-family:'Oswald',sans-serif;
    font-size:13px;text-transform:uppercase;letter-spacing:1.5px;
    color:var(--text-dim);margin:0 0 12px;
  }
  .lyric-line{
    font-size:16px;line-height:1.9;
    color:var(--text-dim);
    transition:color .2s ease, transform .2s ease;
  }
  .lyric-line.active{
    color:var(--amber);
    font-weight:700;
    transform:scale(1.02);
  }
  .lyrics-empty{
    font-size:13px;color:var(--text-dim);line-height:1.6;
  }
  .lyrics-empty code{background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:4px;}

  .footer-note{
    text-align:center;color:var(--text-dim);font-size:11px;
    margin-top:50px;line-height:1.7;
  }
  .footer-note code{background:var(--panel-hi);padding:2px 6px;border-radius:4px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">ANTHEM <span>ARENA</span></div>
  <input class="searchbox" id="searchInput" type="text" placeholder="Search teams, countries, songs..." autocomplete="off">
  <div style="width:32px;"></div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <button class="sidebar-item active" data-filter="all">🏠 All</button>
      <button class="sidebar-item" data-filter="favorites">❤ Favorites</button>
      <button class="sidebar-item" data-filter="new">🆕 New</button>
      <button class="sidebar-item" data-filter="old-school">🕰 Old School</button>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Collections</div>
      <div id="sidebarCollections"></div>
    </div>
  </aside>
  <div class="wrap" id="collectionsWrap"></div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title-block">
        <div class="modal-emoji" id="mEmoji">🏉</div>
        <div>
          <h2 id="mName">—</h2>
          <div class="song-line" id="mSong">—</div>
          <div class="artist-line" id="mArtist">—</div>
        </div>
      </div>
      <button class="close-btn" id="closeModal">✕</button>
    </div>

    <div class="player-area" id="playerArea"></div>
    <div class="link-row" id="linkRow"></div>
    <div class="trivia-box" id="mTrivia"></div>

    <div class="lyrics-panel">
      <h3>Lyrics</h3>
      <div id="lyricsBody"></div>
    </div>
  </div>
</div>

<div class="footer-note">
  Audio plays via YouTube/Spotify (licensed there, not hosted here).<br>
  Lyrics are wired for sync but intentionally left blank in this build — plug in a licensed source (e.g. Musixmatch API) or paste text you have rights to into each entry's <code>lyrics</code> array.
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ---------------- DATA ----------------
// collections: array of tags this entry belongs to, used to build the home rows
// youtubeId: leave blank until you find the real video ID (from the YouTube URL after ?v=)
// spotifyQuery: used as a search-link fallback
// lyrics: [{t: seconds, text: "line"}] — LEFT EMPTY on purpose, see footer note

const DATA = [
  {id:'demo', emoji:'🎤', name:'Demo Track', song:'How Lyric Sync Works', artist:'Anthem Arena', collections:['World'],
    youtubeId:'', spotifyQuery:'demo track',
    trivia:'This is a placeholder showing how the lyric highlighting works as a song plays. Real entries below have this wired up but empty.',
    lyrics:[
      {t:0, text:'[Line 1 appears here, highlighted at 0s]'},
      {t:4, text:'[Line 2 appears here, highlighted at 4s]'},
      {t:8, text:'[Line 3 appears here, highlighted at 8s]'},
      {t:12, text:'[Line 4 appears here, highlighted at 12s]'}
    ]},

  // SOUTH AFRICA / RUGBY
  {id:'bokke', emoji:'🏉', name:'Springboks', song:'Hier Kom die Bokke', artist:'Fan Chant / Traditional', collections:['South Africa','Rugby'], era:'old-school',
    youtubeId:'', spotifyQuery:'Hier Kom die Bokke', trivia:"South Africa's rugby anthem, sung stadium-wide before every Test.", lyrics:[]},
  {id:'bloubul', emoji:'🐂', name:'Blue Bulls', song:'Die Bloubul', artist:'Steve Hofmeyr', collections:['South Africa','Rugby'],
    youtubeId:'', spotifyQuery:'Die Bloubul Steve Hofmeyr', trivia:"Loftus Versfeld's home anthem — belted out after every win.", lyrics:[]},
  {id:'lions', emoji:'🦁', name:'Golden Lions', song:"Lions Roar", artist:'Fan Chant', collections:['South Africa','Rugby'], era:'new',
    youtubeId:'', spotifyQuery:'Golden Lions rugby chant', trivia:"Ellis Park's matchday chant tradition.", lyrics:[]},
  {id:'sharks', emoji:'🦈', name:'Sharks', song:'Shark Attack Chant', artist:'Fan Chant', collections:['South Africa','Rugby'], era:'new',
    youtubeId:'', spotifyQuery:'Sharks rugby chant Kings Park', trivia:"Kings Park's crowd chant, timed to attacking sequences.", lyrics:[]},
  {id:'cheetahs', emoji:'🐘', name:'Cheetahs', song:'Free State Vastrap', artist:'Traditional', collections:['South Africa','Rugby'], era:'old-school',
    youtubeId:'', spotifyQuery:'Free State Vastrap', trivia:"Bloemfontein crowds lean on Free State folk tunes.", lyrics:[]},
  {id:'wp', emoji:'🦅', name:'Western Province', song:'WP Chant', artist:'Fan Chant', collections:['South Africa','Rugby'], era:'new',
    youtubeId:'', spotifyQuery:'Western Province rugby chant Newlands', trivia:"Newlands' terrace chant tradition.", lyrics:[]},

  // SOUTH AFRICA / SOCCER
  {id:'chiefs', emoji:'⚫', name:'Kaizer Chiefs', song:'Amakhosi', artist:'Fan Chant', collections:['South Africa','Soccer'], era:'new',
    youtubeId:'', spotifyQuery:'Amakhosi Kaizer Chiefs chant', trivia:"'Amakhosi' means 'The Chiefs' in Zulu.", lyrics:[]},
  {id:'pirates', emoji:'🔴', name:'Orlando Pirates', song:'Ezomabhakabhaka', artist:'Fan Chant', collections:['South Africa','Soccer'], era:'new',
    youtubeId:'', spotifyQuery:'Orlando Pirates chant Ezomabhakabhaka', trivia:"References 'the sky' — the club's nickname is the Sea Robbers.", lyrics:[]},
  {id:'sundowns', emoji:'🟢', name:'Mamelodi Sundowns', song:'Masandawana', artist:'Fan Chant', collections:['South Africa','Soccer'], era:'new',
    youtubeId:'', spotifyQuery:'Masandawana Sundowns chant', trivia:"'We are the ones' — the Brazilians' rallying chant.", lyrics:[]},
  {id:'sasoc', emoji:'🇿🇦', name:'South Africa', song:'National Anthem of South Africa', artist:'Traditional', collections:['South Africa'], era:'old-school',
    youtubeId:'', spotifyQuery:'South Africa national anthem', trivia:"Unique worldwide — combines five languages in one anthem.", lyrics:[]},

  // UK
  {id:'scotland', emoji:'🏴', name:'Scotland', song:'Yes Sir, I Can Boogie', artist:'Baccara', collections:['UK'], era:'old-school',
    youtubeId:'', spotifyQuery:'Yes Sir I Can Boogie Baccara', trivia:"A 1977 disco track adopted decades later as a Tartan Army anthem.", lyrics:[]},
  {id:'wales', emoji:'🏴', name:'Wales', song:'Hen Wlad Fy Nhadau', artist:'Traditional', collections:['UK'], era:'old-school',
    youtubeId:'', spotifyQuery:'Hen Wlad Fy Nhadau', trivia:"Crowd singing here is famously louder than any recording.", lyrics:[]},
  {id:'liverpool', emoji:'⚽', name:'Liverpool FC', song:"You'll Never Walk Alone", artist:'Gerry & The Pacemakers', collections:['UK','Soccer'], era:'old-school',
    youtubeId:'', spotifyQuery:"You'll Never Walk Alone Gerry and the Pacemakers", trivia:"Originally a Carousel show tune, became the Kop's anthem in the 1960s.", lyrics:[]},
  {id:'westham', emoji:'⚽', name:'West Ham United', song:"I'm Forever Blowing Bubbles", artist:'Traditional', collections:['UK','Soccer'], era:'old-school',
    youtubeId:'', spotifyQuery:"I'm Forever Blowing Bubbles West Ham", trivia:"Sung at the ground since the early 1900s.", lyrics:[]},

  // USA
  {id:'usa-anthem', emoji:'🇺🇸', name:'USA', song:'The Star-Spangled Banner', artist:'Traditional', collections:['USA'], era:'old-school',
    youtubeId:'', spotifyQuery:'Star Spangled Banner', trivia:"Played before nearly every major US sporting event.", lyrics:[]},
  {id:'rock-you', emoji:'🏟️', name:'US Stadiums', song:'We Will Rock You', artist:'Queen', collections:['USA'], era:'old-school',
    youtubeId:'', spotifyQuery:'We Will Rock You Queen', trivia:"The stomp-stomp-clap beat is a staple across American arenas.", lyrics:[]},

  // SPAIN
  {id:'realmadrid', emoji:'⚪', name:'Real Madrid', song:'Himno del Real Madrid', artist:'Club Anthem', collections:['Spain','Soccer'], era:'old-school',
    youtubeId:'', spotifyQuery:'Himno del Real Madrid', trivia:"The official club anthem played at the Santiago Bernabéu.", lyrics:[]},
  {id:'barca', emoji:'🔴', name:'FC Barcelona', song:'Cant del Barça', artist:'Club Anthem', collections:['Spain','Soccer'], era:'old-school',
    youtubeId:'', spotifyQuery:'Cant del Barca', trivia:"Sung in Catalan before big matches at Camp Nou.", lyrics:[]},
  {id:'spain-anthem', emoji:'🇪🇸', name:'Spain', song:'Marcha Real', artist:'Traditional', collections:['Spain'], era:'old-school',
    youtubeId:'', spotifyQuery:'Marcha Real Spain anthem', trivia:"One of the few national anthems with no official lyrics.", lyrics:[]},

  // RUGBY (world)
  {id:'haka', emoji:'🏉', name:'New Zealand Haka', song:'Ka Mate', artist:'Traditional Māori', collections:['Rugby','World'], era:'old-school',
    youtubeId:'', spotifyQuery:'Ka Mate Haka', trivia:"Performed before matches since 1888 — sport's most famous ritual.", lyrics:[]},
  {id:'swinglow', emoji:'🏉', name:'England Rugby', song:'Swing Low, Sweet Chariot', artist:'Traditional Spiritual', collections:['Rugby','UK'], era:'old-school',
    youtubeId:'', spotifyQuery:'Swing Low Sweet Chariot England rugby', trivia:"Adopted by Twickenham crowds in the late 1980s.", lyrics:[]},
  {id:'nz-anthem', emoji:'🇳🇿', name:'New Zealand', song:'God Defend New Zealand', artist:'Traditional', collections:['Rugby','World'], era:'old-school',
    youtubeId:'', spotifyQuery:'God Defend New Zealand', trivia:"Sung in Māori and English before every All Blacks Test.", lyrics:[]},

  // CRICKET
  {id:'barmy', emoji:'🏏', name:'Barmy Army', song:'Barmy Army Chants', artist:'Fan Chant', collections:['Cricket','UK'], era:'new',
    youtubeId:'', spotifyQuery:'Barmy Army chants', trivia:"England's traveling cricket fan army, famous during Ashes tours.", lyrics:[]},
  {id:'india-cricket', emoji:'🏏', name:'India Cricket', song:'Jeetega Bhai Jeetega', artist:'Fan Chant', collections:['Cricket','World'], era:'new',
    youtubeId:'', spotifyQuery:'Jeetega Bhai Jeetega chant', trivia:"'We will win, brother' — a staple in packed Indian stadiums.", lyrics:[]},
];

const COLLECTION_ORDER = ['South Africa','Rugby','Soccer','Cricket','UK','USA','Spain','World'];
const TILE_COLORS = ['#1F6B4A','#4FA8D8','#F2A104','#C1272D','#8B5CF6','#2FA36B','#E85D75','#0B5E8A'];

let ytPlayer = null;
let syncInterval = null;

let favorites = new Set(JSON.parse(localStorage.getItem('anthemArenaFavorites') || '[]'));
let currentFilter = 'all';
let currentQuery = '';

function saveFavorites(){
  localStorage.setItem('anthemArenaFavorites', JSON.stringify([...favorites]));
}
function toggleFavorite(id){
  if(favorites.has(id)) favorites.delete(id); else favorites.add(id);
  saveFavorites();
  renderCollections();
}

function colorFor(id){
  let hash = 0;
  for(const c of id) hash = c.charCodeAt(0) + ((hash<<5)-hash);
  return TILE_COLORS[Math.abs(hash) % TILE_COLORS.length];
}

function renderSidebarCollections(){
  const holder = document.getElementById('sidebarCollections');
  holder.innerHTML = '';
  COLLECTION_ORDER.forEach(col=>{
    const btn = document.createElement('button');
    btn.className = 'sidebar-item';
    btn.dataset.filter = col;
    btn.textContent = col;
    holder.appendChild(btn);
  });
}

function getPool(){
  let pool = DATA;
  if(currentFilter === 'favorites') pool = pool.filter(d=>favorites.has(d.id));
  else if(currentFilter === 'new') pool = pool.filter(d=>d.era === 'new');
  else if(currentFilter === 'old-school') pool = pool.filter(d=>d.era === 'old-school');
  else if(currentFilter !== 'all') pool = pool.filter(d=>d.collections.includes(currentFilter));

  const q = currentQuery.trim().toLowerCase();
  if(q){
    pool = pool.filter(d=>
      d.name.toLowerCase().includes(q) ||
      d.song.toLowerCase().includes(q) ||
      d.artist.toLowerCase().includes(q) ||
      d.collections.some(c=>c.toLowerCase().includes(q))
    );
  }
  return pool;
}

function renderCollections(){
  const wrap = document.getElementById('collectionsWrap');
  wrap.innerHTML = '';
  const pool = getPool();

  let anyShown = false;
  COLLECTION_ORDER.forEach(col=>{
    const items = pool.filter(d=>d.collections.includes(col));
    if(items.length === 0) return;
    anyShown = true;
    const section = document.createElement('div');
    section.className = 'collection-row';
    section.innerHTML = '<h2>' + col + '</h2>';
    const scroll = document.createElement('div');
    scroll.className = 'tile-scroll';
    items.forEach(d=>{
      const tile = document.createElement('div');
      tile.className = 'tile';
      const isFav = favorites.has(d.id);
      tile.innerHTML =
        '<div class="tile-art" style="background:' + colorFor(d.id) + ';">' +
          '<button class="fav-btn' + (isFav ? ' active' : '') + '" data-id="' + d.id + '">' + (isFav ? '♥' : '♡') + '</button>' +
          d.emoji +
        '</div>' +
        '<div class="tile-name">' + d.name + '</div>' +
        '<div class="tile-song">' + d.song + '</div>';
      tile.addEventListener('click', function(){ openModal(d); });
      tile.querySelector('.fav-btn').addEventListener('click', function(e){
        e.stopPropagation();
        toggleFavorite(d.id);
      });
      scroll.appendChild(tile);
    });
    section.appendChild(scroll);
    wrap.appendChild(section);
  });

  if(!anyShown){
    let msg = currentQuery.trim()
      ? 'No matches for "' + currentQuery + '". Try a different team, country, or song.'
      : 'Nothing here yet.';
    if(!currentQuery.trim() && currentFilter === 'favorites') msg += ' Tap the ♡ on any tile to add favorites.';
    wrap.innerHTML = '<div class="no-results">' + msg + '</div>';
  }
}

function openModal(d){
  document.getElementById('mEmoji').textContent = d.emoji;
  document.getElementById('mName').textContent = d.name;
  document.getElementById('mSong').textContent = d.song;
  document.getElementById('mArtist').textContent = d.artist;
  document.getElementById('mTrivia').textContent = d.trivia;

  const playerArea = document.getElementById('playerArea');
  playerArea.innerHTML = '';
  if(d.youtubeId){
    playerArea.innerHTML = '<div id="ytHolder" style="width:100%;height:100%;"></div>';
  } else {
    playerArea.innerHTML = '<div class="no-video">No video linked yet — add a YouTube ID for ' + d.name + ' in the DATA array to play it here.</div>';
  }

  const linkRow = document.getElementById('linkRow');
  const ytQuery = encodeURIComponent(d.song + ' ' + d.artist);
  const spQuery = encodeURIComponent(d.spotifyQuery);
  linkRow.innerHTML =
    '<a class="link-btn yt" href="https://www.youtube.com/results?search_query=' + ytQuery + '" target="_blank" rel="noopener">▶ Search YouTube</a>' +
    '<a class="link-btn sp" href="https://open.spotify.com/search/' + spQuery + '" target="_blank" rel="noopener">▶ Search Spotify</a>';

  const lyricsBody = document.getElementById('lyricsBody');
  if(!d.lyrics || d.lyrics.length === 0){
    lyricsBody.innerHTML = '<div class="lyrics-empty">No lyrics added for this one yet. Pull them from a licensed source like the <code>Musixmatch API</code>, or paste text you have rights to into this entry\'s <code>lyrics</code> array.</div>';
  } else {
    lyricsBody.innerHTML = '';
    d.lyrics.forEach(function(line, i){
      const el = document.createElement('div');
      el.className = 'lyric-line';
      el.id = 'lyric-' + i;
      el.textContent = line.text;
      lyricsBody.appendChild(el);
    });
  }

  document.getElementById('modalBackdrop').classList.add('open');

  clearInterval(syncInterval);
  if(d.youtubeId && window.YT && window.YT.Player){
    ytPlayer = new YT.Player('ytHolder', {
      videoId: d.youtubeId,
      playerVars:{autoplay:1},
      events:{
        onStateChange:function(e){
          if(e.data === YT.PlayerState.PLAYING){
            syncInterval = setInterval(function(){ syncLyrics(d); }, 400);
          } else {
            clearInterval(syncInterval);
          }
        }
      }
    });
  } else if(d.lyrics && d.lyrics.length && !d.youtubeId){
    let fakeTime = 0;
    syncInterval = setInterval(function(){
      fakeTime += 0.4;
      highlightActiveLine(d, fakeTime);
    }, 400);
  }
}

function syncLyrics(d){
  if(!ytPlayer || !ytPlayer.getCurrentTime) return;
  const t = ytPlayer.getCurrentTime();
  highlightActiveLine(d, t);
}
function highlightActiveLine(d, t){
  let activeIdx = -1;
  d.lyrics.forEach(function(line,i){ if(t >= line.t) activeIdx = i; });
  d.lyrics.forEach(function(line,i){
    const el = document.getElementById('lyric-'+i);
    if(!el) return;
    el.classList.toggle('active', i===activeIdx);
  });
  if(activeIdx >= 0){
    const el = document.getElementById('lyric-'+activeIdx);
    if(el) el.scrollIntoView({block:'center', behavior:'smooth'});
  }
}

document.getElementById('closeModal').addEventListener('click', function(){
  document.getElementById('modalBackdrop').classList.remove('open');
  clearInterval(syncInterval);
  if(ytPlayer && ytPlayer.destroy) ytPlayer.destroy();
});
document.getElementById('modalBackdrop').addEventListener('click', function(e){
  if(e.target.id === 'modalBackdrop'){
    document.getElementById('modalBackdrop').classList.remove('open');
    clearInterval(syncInterval);
    if(ytPlayer && ytPlayer.destroy) ytPlayer.destroy();
  }
});

document.getElementById('searchInput').addEventListener('input', function(e){
  currentQuery = e.target.value;
  if(currentQuery.trim()){
    currentFilter = 'all';
    document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
    const allBtn = document.querySelector('.sidebar-item[data-filter="all"]');
    if(allBtn) allBtn.classList.add('active');
  }
  renderCollections();
});

document.getElementById('sidebar').addEventListener('click', function(e){
  const btn = e.target.closest('.sidebar-item');
  if(!btn) return;
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  currentQuery = '';
  document.getElementById('searchInput').value = '';
  renderCollections();
});

renderSidebarCollections();
renderCollections();
</script>
</body>
</html>
